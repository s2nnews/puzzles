name: Daily Index

# Fixed 20:00 UTC = 06:00 Sydney (AEST). A fixed scrape time also keeps the
# BSR series comparable day-to-day (absolute sales rank drifts with time of
# day). eBay is deliberately excluded — its bot wall punishes datacenter IPs
# far harder than a residential one, so it runs locally (see run_daily.py).
on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch: {}        # manual trigger from the Actions tab

permissions:
  contents: write              # to commit the refreshed index.json

concurrency:
  group: daily-index
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - run: pip install -r requirements.txt

      - name: Collect due sources (robust set) and rebuild the Index
        run: python run_daily.py --skip ebay
        env:
          PYTHONIOENCODING: utf-8

      - name: Commit refreshed index.json
        run: |
          git config user.name  "puzzle-index-bot"
          git config user.email "actions@github.com"
          git add data/processed/index.json
          if git diff --cached --quiet; then
            echo "No index change today."
          else
            git commit -m "data: refresh Index $(date -u +%F)"
            git push
          fi
